name: Daily Romanian Insurance News

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    env:
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_GRAPH_API_VERSION: ${{ vars.FACEBOOK_GRAPH_API_VERSION || 'v19.0' }}
      FACEBOOK_SKIP_DUPLICATE_POST: ${{ vars.FACEBOOK_SKIP_DUPLICATE_POST || 'true' }}
      NEWS_LOOKBACK_HOURS: ${{ vars.NEWS_LOOKBACK_HOURS || '48' }}
      NEWS_MAX_ITEMS_PER_QUERY: ${{ vars.NEWS_MAX_ITEMS_PER_QUERY || '20' }}
      NEWS_SEARCH_QUERIES: ${{ vars.NEWS_SEARCH_QUERIES }}
      TZ: Europe/Bucharest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Post Romanian insurance news
        run: npm run post:romanian-insurance-news
