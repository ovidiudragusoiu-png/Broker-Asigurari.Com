risk:
  max_single_stock_target_pct: 35
  preferred_single_stock_target_pct: 25
  concentration_warning_pct: 25
  concentration_critical_pct: 50
  amd_default_trim_steps_pct:
    - 5
    - 10
    - 15
  speculative_max_weight_pct: 3
  high_risk_max_weight_pct: 10
  default_buy_allocation_pct_of_cash: 20
  default_add_small_allocation_pct_of_cash: 10
  minimum_action_value_usd: 250

schedule:
  timezone: America/New_York
  exchange_calendar: NYSE
  morning_report_time: "10:15"
  midday_report_time: "13:30"
  avoid_duplicate_reports: true

data_sources:
  price_provider: yfinance
  news:
    lookback_days: 5
    max_articles_per_ticker: 8
    max_macro_articles: 12
    use_yfinance_news: true
    use_finnhub: true
    use_newsapi: true
    use_alpha_vantage: true
    use_gdelt: true
    use_sec_filings: true
    use_finnhub_insider: true
    macro_queries:
      - Federal Reserve rates inflation Nasdaq S&P 500
      - VIX US 10 year yield dollar oil market risk
      - China Taiwan export restrictions semiconductors AI chips
      - consumer spending retail sales tariffs margins
    sector_queries:
      semiconductors: AI chips semiconductors data center hyperscaler capex Nvidia TSMC Samsung Broadcom AMD
      consumer: consumer spending retail sales beauty beverages margins inventory TikTok tariffs
      fintech: rates fintech regulation student loans banking credit quality
      advertising: advertising spend AI ads privacy regulation Google Meta TikTok

notifications:
  email:
    enabled: true
    smtp_host: ${SMTP_HOST}
    smtp_port: ${SMTP_PORT}
    smtp_username: ${SMTP_USERNAME}
    smtp_password: ${SMTP_PASSWORD}
    sender: ${EMAIL_SENDER}
    recipients:
      - ${EMAIL_RECIPIENT}
    use_tls: true
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}

reporting:
  output_dir: reports
  state_file: .portfolio_news_advisor_state.json
  log_file: logs/portfolio_news_advisor.log
  save_format: md
  include_raw_data_appendix: false
  openai_model: gpt-4o-mini
  llm_temperature: 0.2
